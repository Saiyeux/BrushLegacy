# BrushLegacy Configuration Template
# Copy to config.yaml and fill in your local values.
# config.yaml is gitignored — edit freely without affecting others.

models:
  painttransformer: "models/220_net_g.pth"
  u2net: "models/u2net.pth"           # 176 MB, not needed for inference-only

# Canvas settings (match physical setup)
canvas:
  width_px: 512
  height_px: 512
  width_mm: 480        # physical canvas width  (mm)
  height_mm: 480       # physical canvas height (mm)
  tilt_x: 0.0          # dz/dx slope (m/m); 0 = use canvas.npy calibration only
  tilt_y: 0.0          # dz/dy slope (m/m); 0 = use canvas.npy calibration only

# PaintTransformer inference
stroke:
  patch_size: 32
  stroke_num: 8
  p_dim: 16            # stroke parameter dimensions
  layers: [3, 4, 5]   # brush sizes: large → small

# Palette calibration parameters (measure physically and fill in)
palette:
  cell_width_mm: 28    # column pitch Red → Yellow (measured)
  cell_height_mm: 34   # row pitch Red → Orange (measured)
  dip_depth_mm: 8      # how many mm to descend below hover-1 when dipping paint

# Motion speeds (all MotionGenerator/Cartesian; halved from Cobrush Pro reference)
speeds:
  hover: 0.1        # transit moves between positions
  dip: 0.05         # descend/ascend into paint slot or water cup
  cone: 0.8         # conical sweep angular rate (rad/s)
  soak_sec: 0.3     # pause after dipping before sweeping
  drip_sec: 3.0     # wait at hover after wash for water to drip off

# Robot coordinate conversion (franka_new / RT box)
robot:
  ip: "192.170.10.200"
  canvas_side_m: 0.48       # physical canvas side length (m)
  canvas_image_size: 512    # pixel size used for coordinate normalisation
  calibration_matrix: "data/calibration/matrix.npy"
  calibration_xyz: "data/calibration/xyz_rotated2.npy"

# Trajectory
trajectory:
  hover_z: 0.15     # hover height above canvas (m)
  paint_z_offset: 0.005
  speed: 0.65       # air-motion speed (m/s)

# Visualization
visualization:
  dpi: 150
  figsize: [12, 8]
  save_format: "png"
